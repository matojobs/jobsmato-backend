version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: jobsmato_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobsmato_db
      POSTGRES_USER: jobsmato_user
      POSTGRES_PASSWORD: jobsmato_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - jobsmato_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobsmato_user -d jobsmato_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: jobsmato_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - jobsmato_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend API
  api:
    image: jobsmato-backend:latest
    container_name: jobsmato_api
    restart: unless-stopped
    ports:
      - "5004:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      
      # Database
      DATABASE_URL: postgresql://jobsmato_user:jobsmato_password@postgres:5432/jobsmato_db
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: jobsmato_user
      DB_PASSWORD: jobsmato_password
      DB_NAME: jobsmato_db
      
      # JWT
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: your-super-secret-refresh-key-change-in-production
      JWT_REFRESH_EXPIRES_IN: 30d
      
      # CORS
      FRONTEND_URL: https://jobsmato.com
      
      # Email (SMTP)
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: Info@jobsmato.com
      SMTP_PASS: YOUR_SMTP_PASSWORD_HERE
      SMTP_FROM: noreply@jobsmato.com
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      
      # Rate Limiting
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
      
      # File Upload
      MAX_FILE_SIZE: 10485760
      ALLOWED_FILE_TYPES: "image/jpeg,image/png,image/gif,application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
      
      # Pagination
      DEFAULT_PAGE_SIZE: 10
      MAX_PAGE_SIZE: 100
      
      # Cloudinary
      CLOUDINARY_CLOUD_NAME: dhcdcbhe8
      CLOUDINARY_API_KEY: 373965389671927
      CLOUDINARY_API_SECRET: YOUR_CLOUDINARY_API_SECRET_HERE
      #Google oAuth
      GOOGLE_CLIENT_ID: "YOUR_GOOGLE_CLIENT_ID_HERE"
      GOOGLE_CLIENT_SECRET: "YOUR_GOOGLE_CLIENT_SECRET_HERE"
      GOOGLE_CALLBACK_URL: "https://api.jobsmato.com/api/auth/google/callback"
      
      # Google Drive Service Account (for file downloads)
      # Get these from Google Cloud Console > IAM & Admin > Service Accounts
      # Create a service account, download JSON key, extract client_email and private_key
      # For private_key, replace actual newlines with \n
      GOOGLE_DRIVE_CLIENT_EMAIL: ""
      GOOGLE_DRIVE_PRIVATE_KEY: ""
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jobsmato_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy - Using host Nginx instead of container
  # nginx:
  #   image: nginx:alpine
  #   container_name: jobsmato_nginx
  #   restart: unless-stopped
  #   ports:
  #     - "8080:80"
  #     - "8443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf
  #     - ./ssl:/etc/nginx/ssl
  #   depends_on:
  #     - api
  #   networks:
  #     - jobsmato_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  jobsmato_network:
    driver: bridge
