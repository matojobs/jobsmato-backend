version: '3.8'

services:
  # PostgreSQL Database - Updated to match .env file
  postgres:
    image: postgres:15-alpine
    container_name: jobsmato_postgres_local
    restart: unless-stopped
    environment:
      POSTGRES_DB: jobsmato_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - jobsmato_local_network

  # Redis for caching and queues
  redis:
    image: redis:7-alpine
    container_name: jobsmato_redis_local
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_local_data:/data
    networks:
      - jobsmato_local_network

volumes:
  postgres_local_data:
    driver: local
  redis_local_data:
    driver: local

networks:
  jobsmato_local_network:
    driver: bridge
