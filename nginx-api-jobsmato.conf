server {
    listen 80;
    listen [::]:80;
    server_name api.jobsmato.com;

    # Reverse proxy to NestJS (docker) on port 5004
    location /api/ {
        proxy_pass http://localhost:5004/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Friendly health alias
    location = /health {
        proxy_pass http://localhost:5004/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Block non-API routes (keeps surface area small)
    location / {
        return 404;
    }
}